name: Deploy to GCP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SERVICE_KEY: ${{ secrets.GCP_SERVICE_KEY }}
  GCP_REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Run tests
      run: npm test -- --coverage --watchAll=false

    - name: Run lint
      run: npm run lint --if-present

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Build application
      run: npm run build
      env:
        REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}

    - name: Setup Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SERVICE_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker
      run: gcloud auth configure-docker

    - name: Build Docker image
      run: |
        docker build -t gcr.io/$GCP_PROJECT_ID/fincore-ui:${{ github.sha }} .
        docker tag gcr.io/$GCP_PROJECT_ID/fincore-ui:${{ github.sha }} gcr.io/$GCP_PROJECT_ID/fincore-ui:latest

    - name: Push Docker image
      run: |
        docker push gcr.io/$GCP_PROJECT_ID/fincore-ui:${{ github.sha }}
        docker push gcr.io/$GCP_PROJECT_ID/fincore-ui:latest

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy fincore-ui \
          --image gcr.io/$GCP_PROJECT_ID/fincore-ui:latest \
          --platform managed \
          --region $GCP_REGION \
          --allow-unauthenticated \
          --port 80 \
          --memory 512Mi \
          --cpu 1000m \
          --max-instances 10